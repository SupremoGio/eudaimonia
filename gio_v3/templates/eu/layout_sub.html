<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}EUDAIMONIA{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface : '#110E1C',
            card    : '#1A1627',
            card2   : '#221D32',
            border  : 'rgba(201,168,76,0.15)',
            border2 : 'rgba(201,168,76,0.28)',
            dim     : '#6A6050',
            mid     : '#A89880',
            gio: {
              violet : '#C9A84C',
              vl     : '#E8C96D',
              vd     : 'rgba(201,168,76,0.08)',
              cyan   : '#A89880',
              amber  : '#C9A84C',
              coral  : '#f43f5e',
              emerald: '#10b981',
            },
          },
          fontFamily: {
            mono  : ['"DM Sans"',            'sans-serif'],
            sans  : ['"DM Sans"',            'sans-serif'],
            serif : ['"Cormorant Garamond"',  'serif'],
          },
        },
      },
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/css/app.css">

  <style>
    :root {
      --bg:#09070F; --surf:#110E1C; --card:#1A1627; --card2:#221D32;
      --b:rgba(201,168,76,0.15); --b2:rgba(201,168,76,0.28);
      --violet:#C9A84C; --violet-l:#E8C96D; --violet-d:rgba(201,168,76,0.08);
      --cyan:#A89880;   --cyan-l:#C8B898;   --cyan-d:rgba(168,152,128,0.1);
      --emerald:#10b981; --emerald-l:#6ee7b7; --emerald-d:rgba(16,185,129,.1);
      --amber:#C9A84C;  --amber-l:#E8C96D;  --amber-d:rgba(201,168,76,0.08);
      --coral:#f43f5e;  --coral-d:rgba(244,63,94,.1);
      --blue:#A89880;   --blue-d:rgba(168,152,128,.08);
      --pink:#E8C96D;   --pink-d:rgba(232,201,109,.08);
      --indigo:#C9A84C; --orange:#E8C96D;
      --gold:#C9A84C;   --gold-d:rgba(201,168,76,0.08); --gold-g:rgba(201,168,76,0.28);
      --purple:#E8C96D; --green:#10b981; --red:#f43f5e;
      --text:#F2EDE0;   --mid:#A89880;   --dim:#6A6050;
      --sans:'DM Sans',sans-serif;
      --mono:'DM Sans',sans-serif;
      --serif:'Cormorant Garamond',serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    body { background: #09070F; color: #F2EDE0; font-family: 'DM Sans', sans-serif; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 2px; }
    * { scrollbar-width: thin; scrollbar-color: rgba(201,168,76,0.2) transparent; }

    .tile { background:var(--card); border:1px solid var(--b); border-radius:14px; padding:20px; }
    .tile-lbl { font-size:.48rem; color:var(--dim); letter-spacing:.2em; text-transform:uppercase; margin-bottom:14px; font-family:var(--sans); }

    .btn-a { background:linear-gradient(135deg,#7A5520,#C9A84C); border:none; color:#09070F; padding:8px 18px; border-radius:8px; font-size:.62rem; font-family:var(--sans); cursor:pointer; transition:opacity .18s; font-weight:500; }
    .btn-a:hover { opacity:.85; }
    .btn-g { background:transparent; border:1px solid var(--b2); color:var(--mid); padding:8px 16px; border-radius:8px; font-size:.62rem; font-family:var(--sans); cursor:pointer; transition:all .18s; white-space:nowrap; }
    .btn-g:hover { border-color:var(--gold); color:var(--gold); }
    .btn-r { background:transparent; border:1px solid var(--b); color:var(--dim); padding:6px 11px; border-radius:7px; font-size:.56rem; font-family:var(--sans); cursor:pointer; transition:all .18s; }
    .btn-r:hover { border-color:var(--coral); color:var(--coral); }
    .btn-gr { background:transparent; border:1px solid var(--b); color:var(--dim); padding:6px 11px; border-radius:7px; font-size:.56rem; font-family:var(--sans); cursor:pointer; transition:all .18s; }
    .btn-gr:hover { border-color:var(--emerald); color:var(--emerald); }

    .fi { background:var(--card2); border:1px solid var(--b); border-radius:8px; padding:8px 12px; color:var(--text); font-family:var(--sans); font-size:.8rem; outline:none; width:100%; transition:border-color .18s; }
    .fi:focus { border-color:var(--gold); }
    .fi option { background:var(--card2); }
    .fl { font-size:.48rem; color:var(--dim); letter-spacing:.14em; text-transform:uppercase; margin-bottom:4px; display:block; font-family:var(--sans); }

    .pri { font-size:.46rem; padding:2px 7px; border-radius:100px; letter-spacing:.07em; text-transform:uppercase; }
    .pri-critical  { background:var(--coral-d);  border:1px solid rgba(244,63,94,.25);  color:var(--coral); }
    .pri-important { background:var(--amber-d);  border:1px solid rgba(201,168,76,.25); color:var(--amber); }
    .pri-normal    { background:var(--b);         color:var(--dim); }

    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:500; display:none; align-items:center; justify-content:center; padding:16px; backdrop-filter:blur(4px); }
    .modal-bg.open { display:flex; }
    .modal { background:var(--card); border:1px solid var(--b2); border-radius:16px; padding:28px; width:440px; max-width:100%; box-shadow:0 24px 80px rgba(0,0,0,0.7); }
    .modal-title { font-family:var(--serif); font-size:1.3rem; font-weight:600; margin-bottom:18px; color:var(--text); letter-spacing:.06em; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:18px; }

    .af { background:var(--card); border:1px solid var(--b2); border-radius:7px; padding:16px; margin-bottom:16px; }
    .af-lbl { font-size:.48rem; color:var(--dim); letter-spacing:.16em; text-transform:uppercase; margin-bottom:12px; font-family:var(--sans); }
    .fg  { display:flex; flex-direction:column; gap:3px; }
    .fgrid { display:grid; gap:8px; margin-bottom:8px; }
    .fgrid.c2 { grid-template-columns:1fr 1fr; }
    .fgrid.c3 { grid-template-columns:1fr 1fr 1fr; }
    .fa { display:flex; gap:7px; justify-content:flex-end; margin-top:4px; }

    .pg-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .pg-t  { font-family:var(--serif); font-size:1.6rem; font-style:italic; font-weight:400; color:var(--text); letter-spacing:.06em; }
    .pg-s  { font-size:.56rem; color:var(--dim); margin-top:1px; font-family:var(--sans); }

    .chips2 { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .ch2 { background:var(--card2); border:1px solid var(--b); border-radius:100px; padding:4px 10px; font-size:.58rem; color:var(--mid); cursor:pointer; transition:all .14s; text-decoration:none; font-family:var(--sans); }
    .ch2:hover, .ch2.on { border-color:var(--gold); color:var(--gold); background:var(--gold-d); }

    .empty-s { text-align:center; padding:36px 18px; color:var(--dim); }
    .empty-s svg { width:26px; height:26px; display:block; margin:0 auto 9px; opacity:.22; }
    .empty-s p { font-size:.64rem; }

    .t-row { display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--card); border:1px solid var(--b); border-radius:6px; margin-bottom:5px; transition:border-color .14s; }
    .t-row:hover { border-color:var(--b2); }
    .t-row.faded { opacity:.4; border-style:dashed; }
    .t-dot { width:14px; height:14px; border:1px solid var(--dim); border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .16s; }
    .t-dot:hover { border-color:var(--gold); }
    .t-dot.ck { background:var(--gold); border-color:var(--gold); }
    .t-dot svg { width:8px; height:8px; color:#09070F; display:none; }
    .t-dot.ck svg { display:block; }
    .t-main { flex:1; min-width:0; }
    .t-title { font-size:.7rem; color:var(--text); font-family:var(--sans); }
    .t-row.faded .t-title { text-decoration:line-through; color:var(--dim); }
    .t-sub { font-size:.5rem; color:var(--gold); margin-top:1px; font-family:var(--sans); }
    .t-meta { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .pts-t { font-size:.48rem; color:var(--gold); background:var(--gold-d); padding:2px 5px; border-radius:100px; }
    .pt { font-size:.46rem; padding:2px 6px; border-radius:100px; letter-spacing:.06em; text-transform:uppercase; }
    .pt-c { background:rgba(244,63,94,.1);    border:1px solid rgba(244,63,94,.2);    color:var(--red); }
    .pt-i { background:rgba(201,168,76,.1);   border:1px solid rgba(201,168,76,.2);   color:var(--gold); }
    .pt-n { background:var(--b); color:var(--dim); }
    .due-t  { font-size:.48rem; color:var(--mid); font-family:var(--sans); }
    .proj-t { font-size:.48rem; color:var(--gold); background:rgba(201,168,76,.07); border:1px solid rgba(201,168,76,.18); padding:2px 5px; border-radius:100px; }
    .ai { background:none; border:none; color:var(--dim); padding:3px; border-radius:3px; display:flex; align-items:center; transition:color .14s; cursor:pointer; font-family:var(--sans); }
    .ai:hover { color:var(--gold); }
    .ai.del:hover { color:var(--red); }
    .ai svg { width:11px; height:11px; }

    /* GTD internal shell */
    .gtd-shell { display:grid; grid-template-columns:180px 1fr; height:calc(100vh - 56px); overflow:hidden; margin:-16px -16px; }
    .gtd-nav { background:var(--surf); border-right:1px solid var(--b); padding:18px 0; display:flex; flex-direction:column; overflow-y:auto; }
    .gn-head { padding:0 14px 14px; border-bottom:1px solid var(--b); }
    .gn-head .t { font-family:var(--serif); font-size:.95rem; font-style:italic; color:var(--gold); }
    .gn-head .s { font-size:.46rem; color:var(--dim); letter-spacing:.14em; text-transform:uppercase; font-family:var(--sans); }
    .gn-sec { font-size:.44rem; color:var(--dim); letter-spacing:.18em; text-transform:uppercase; padding:10px 14px 3px; font-family:var(--sans); }
    .gl { display:flex; align-items:center; gap:8px; padding:7px 14px; color:var(--mid); font-size:.64rem; text-decoration:none; transition:all .14s; border-left:2px solid transparent; font-family:var(--sans); }
    .gl:hover { color:var(--text); background:var(--gold-d); }
    .gl.on { color:var(--gold); background:var(--gold-d); border-left-color:var(--gold); }
    .gl svg { width:13px; height:13px; flex-shrink:0; }
    .gl-badge { margin-left:auto; background:var(--b); color:var(--dim); font-size:.44rem; padding:1px 5px; border-radius:100px; font-family:var(--sans); }
    .gl.on .gl-badge { background:var(--gold); color:#09070F; }
    .gn-foot { padding:12px 14px; margin-top:auto; border-top:1px solid var(--b); }
    .lv-lbl { font-size:.46rem; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; font-family:var(--sans); }
    .lv-bar { background:var(--b); border-radius:100px; height:3px; overflow:hidden; margin-bottom:3px; }
    .lv-fill { height:100%; background:linear-gradient(90deg,#7A5520,#C9A84C,#E8C96D); border-radius:100px; transition:width .5s; }
    .lv-pts { font-size:.44rem; color:var(--dim); font-family:var(--sans); }
    .gtd-body { overflow-y:auto; padding:20px 24px; scrollbar-width:thin; scrollbar-color:var(--b) transparent; }

    @media(min-width:1024px) {
      .gtd-shell { height:calc(100vh - 56px); margin:-24px -24px; }
      .gtd-body  { padding:22px 26px; }
    }
    @media(max-width:767px) {
      .gtd-shell { grid-template-columns:1fr; grid-template-rows:auto 1fr; height:calc(100vh - 48px); }
      .gtd-nav   { flex-direction:row; overflow-x:auto; overflow-y:hidden; border-right:none; border-bottom:1px solid var(--b); padding:8px 12px; gap:4px; height:auto; scrollbar-width:none; }
      .gtd-nav::-webkit-scrollbar { display:none; }
      .gn-head, .gn-sec, .gn-foot { display:none; }
      .gl { flex-shrink:0; flex-direction:column; border-left:none; border-bottom:2px solid transparent; border-radius:10px; padding:8px 14px; font-size:.6rem; gap:3px; min-width:60px; text-align:center; justify-content:center; }
      .gl svg { width:16px; height:16px; }
      .gl.on { border-bottom-color:var(--gold); background:var(--gold-d); }
      .gl-badge { margin-left:0; margin-top:2px; }
      .gtd-body { padding:14px 14px; }
      .modal-bg.open { align-items:flex-end !important; padding:0 !important; }
      .modal { border-radius:22px 22px 0 0 !important; width:100% !important; max-width:100% !important; max-height:88vh; overflow-y:auto; padding-bottom:calc(16px + env(safe-area-inset-bottom)) !important; }
      .fgrid.c2, .fgrid.c3 { grid-template-columns:1fr !important; }
    }
  </style>

  {% block head %}{% endblock %}
</head>

<body class="bg-[#09070F] text-[#F2EDE0] font-sans antialiased min-h-screen">

<!-- TOPBAR -->
<header class="sticky top-0 z-20 flex-shrink-0"
        style="background:rgba(9,7,15,0.97); border-bottom:1px solid rgba(201,168,76,0.1); backdrop-filter:blur(12px);">
  <div class="flex items-center justify-between px-4 md:px-6" style="height:56px;">
    <div class="flex items-center gap-3">
      <a href="/" style="font-family:'DM Sans',sans-serif; font-size:9px; letter-spacing:0.22em; color:#C9A84C; opacity:0.6; text-transform:uppercase; text-decoration:none;">
        ← EUDAIMONIA
      </a>
      <span style="color:rgba(201,168,76,0.2); font-size:10px;">/</span>
      <span style="font-family:'Cormorant Garamond',serif; font-size:16px; color:#F2EDE0; letter-spacing:0.08em; font-weight:600;">
        {% block module_title %}{% endblock %}
      </span>
    </div>
    <div class="flex items-center gap-3">
      <span style="font-size:.5rem; color:#A89880; letter-spacing:.08em; text-transform:uppercase;">
        {% block topright %}{% endblock %}
      </span>
    </div>
  </div>
</header>

<!-- CONTENT -->
<main class="p-4 md:p-6 overflow-x-hidden">
  {% block content %}{% endblock %}
</main>

<!-- TOAST -->
<div id="tw-toast"
     class="fixed bottom-6 right-4 z-50 px-4 py-2.5 rounded-xl text-[0.65rem] shadow-lg opacity-0 translate-y-2 pointer-events-none"
     style="background:#1A1627; border:1px solid rgba(201,168,76,0.3); color:#E8C96D; transition:transform .22s ease, opacity .22s ease;">
</div>

<script>
lucide.createIcons();

function toast(msg, type = 'ok') {
  const t = document.getElementById('tw-toast');
  t.textContent = msg;
  t.classList.remove('opacity-0','translate-y-2');
  t.classList.add('opacity-100','translate-y-0');
  clearTimeout(t._t);
  t._t = setTimeout(() => {
    t.classList.add('opacity-0','translate-y-2');
    t.classList.remove('opacity-100','translate-y-0');
  }, 2500);
}
</script>

{% block scripts %}{% endblock %}
</body>
</html>
