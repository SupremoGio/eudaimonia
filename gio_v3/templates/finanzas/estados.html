{% extends "eu/layout_sub.html" %}{% set pg='finanzas' %}
{% block title %}Estados de Cuenta — Eudaimonia{% endblock %}
{% block module_title %}ESTADOS DE CUENTA{% endblock %}
{% block topright %}<span style="color:var(--gold)">OIKONOMIA · ESTADOS</span>{% endblock %}

{% block content %}
<style>
  /* Full-height container for the React SPA */
  #estados-root {
    min-height: calc(100vh - 120px);
    position: relative;
  }

  /* Override React app backgrounds to match Eudaimonia */
  #estados-root [style*="background: #0f172a"],
  #estados-root [style*="background:#0f172a"] {
    background: var(--bg) !important;
  }
  #estados-root [style*="background: #1e293b"],
  #estados-root [style*="background:#1e293b"] {
    background: var(--surf) !important;
  }
  #estados-root [style*="background: #f8fafc"],
  #estados-root [style*="background:#f8fafc"] {
    background: var(--bg) !important;
  }
</style>

<!-- Pass config to React before the bundle loads -->
<script>
  window.__EU_EMBEDDED__  = true;
  window.__EU_API_BASE__  = '/finanzas/estados/api';
</script>

<div id="estados-root">
  <!-- Loading skeleton shown while React hydrates -->
  <div id="estados-loading" style="display:flex;align-items:center;justify-content:center;min-height:320px;gap:12px;color:var(--dim);font-size:13px;letter-spacing:.1em;">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
         style="animation:spin 1.2s linear infinite;opacity:.5;">
      <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
    </svg>
    CARGANDO ESTADOS DE CUENTA…
  </div>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<!-- React SPA assets (built with: npm run build:eu) -->
<script type="module" src="/static/finanzas/assets/estados.js"></script>

<script>
  // Hide the loading skeleton once React mounts
  const _obs = new MutationObserver(function() {
    const root = document.getElementById('estados-root');
    if (root && root.children.length > 1) {
      const loader = document.getElementById('estados-loading');
      if (loader) loader.remove();
      _obs.disconnect();
    }
  });
  _obs.observe(document.getElementById('estados-root'), { childList: true, subtree: false });
</script>
{% endblock %}
