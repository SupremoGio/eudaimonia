<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EUDAIMONIA</title>

  <!-- Anti-FOUC -->
  <script>
    (function(){
      var t = localStorage.getItem('eu-theme') || 'dark';
      var h = document.documentElement;
      if (t === 'light') { h.classList.remove('dark'); h.classList.add('light'); }
      else               { h.classList.add('dark');    h.classList.remove('light'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    :root, html.dark { --bg:#09070F; --text:#F2EDE0; }
    html.light       { --bg:#F5F0E7; --text:#1C1610; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow-x: hidden; }
    body { background: var(--bg); color: var(--text); transition: background .25s; }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    @keyframes euFadeIn  { from { opacity: 0 } to { opacity: 1 } }
    @keyframes euScaleIn { from { opacity: 0; transform: scale(0.85) } to { opacity: 1; transform: scale(1) } }
    @keyframes euBurst {
      0%   { opacity: 1; transform: translate(0, 0) scale(1) }
      100% { opacity: 0; transform: translate(var(--dx, 28px), var(--dy, -28px)) scale(0) }
    }
    @keyframes undoCountdown {
      from { width: 100% }
      to   { width: 0% }
    }
    @keyframes euShimmer {
      0%   { background-position: 200% 0 }
      100% { background-position: -200% 0 }
    }
    @keyframes euLevelUpRise {
      0%   { transform: translateY(40px) scale(0.7);  opacity: 0; }
      60%  { transform: translateY(-8px) scale(1.05); opacity: 1; }
      100% { transform: translateY(0)    scale(1);    opacity: 1; }
    }
    @keyframes euGoldPulse {
      0%, 100% { opacity: 0.12; transform: scale(1);    }
      50%      { opacity: 0.22; transform: scale(1.05); }
    }
    @keyframes euAchievementRise {
      from { transform: translateY(100%); }
      to   { transform: translateY(0);    }
    }

    input, button { font-family: inherit; }
    input::placeholder { color: #6A6050; }
    button { cursor: pointer; }

    #root { min-height: 100vh; }

    .sk {
      background: linear-gradient(90deg,rgba(201,168,76,.03) 0%,rgba(201,168,76,.08) 50%,rgba(201,168,76,.03) 100%);
      background-size: 200% 100%;
      animation: euShimmer 1.4s ease-in-out infinite;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Server data injected by Flask -->
  <script>
    window.__EUDAIMONIA_DATA__ = {{ eudaimonia_data | tojson | safe }};

    // Theme toggle — reloads so React re-reads the correct color palette
    window.euToggleTheme = function() {
      var current = localStorage.getItem('eu-theme') || 'dark';
      var next    = current === 'dark' ? 'light' : 'dark';
      localStorage.setItem('eu-theme', next);
      location.reload();
    };

    // Refresh dashboard: inmediato si llegó broadcast de actividades, o tras 30s fuera
    (function() {
      var hiddenAt = null;
      var needsRefresh = false;

      // Escucha broadcasts de otras pestañas (actividades, GTD, etc.)
      var ch = new BroadcastChannel('eudaimonia');
      ch.onmessage = function(e) {
        if (e.data && e.data.type === 'data_changed') {
          if (document.hidden) {
            needsRefresh = true;   // reload al volver al tab
          } else {
            location.reload();     // ya visible → recarga directa
          }
        }
      };

      document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
          hiddenAt = Date.now();
        } else {
          if (needsRefresh || (hiddenAt && Date.now() - hiddenAt > 30000)) {
            location.reload();
          }
          needsRefresh = false;
          hiddenAt = null;
        }
      });
    })();
  </script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone (transforms JSX at runtime) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- EUDAIMONIA data layer (plain JS, reads from __EUDAIMONIA_DATA__ at end of file) -->
  <script src="{{ url_for('static', filename='js/eu-data.js') }}?v=20260517d"></script>

  <!-- EUDAIMONIA UI components -->
  <script type="text/babel" src="{{ url_for('static', filename='js/eu-components.jsx') }}?v=20260519f"></script>
  <script type="text/babel" src="{{ url_for('static', filename='js/eu-screens.jsx') }}?v=20260519f"></script>
  <script type="text/babel" src="{{ url_for('static', filename='js/cmdk.jsx') }}?v=20260519f"></script>
  <script type="text/babel" src="{{ url_for('static', filename='js/eu-app.jsx') }}?v=20260519f"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
