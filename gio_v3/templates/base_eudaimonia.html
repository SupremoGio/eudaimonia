<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>EUDAIMONIA</title>

  <!-- Anti-FOUC + scroll reset -->
  <script>
    (function(){
      var t = localStorage.getItem('eu-theme') || 'dark';
      var h = document.documentElement;
      if (t === 'light') { h.classList.remove('dark'); h.classList.add('light'); }
      else               { h.classList.add('dark');    h.classList.remove('light'); }
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      window.scrollTo(0, 0);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ──────────────────────────────────── */
    :root, html.dark {
      --bg:#09070F; --surf:#0F0C1A; --card:#1A1627; --card2:#221D32;
      --surf-nav:#0F0C1A; --surf-top:rgba(9,7,15,0.97);

      --b:rgba(201,168,76,0.15);  --b2:rgba(201,168,76,0.30);

      --gold:#C9A84C; --gold-l:#E8C96D;
      --gold-bg:rgba(201,168,76,0.08); --gold-d:rgba(201,168,76,0.08);
      --gold-border:rgba(201,168,76,0.18); --gold-glow:rgba(201,168,76,0.45);

      --violet:#a78bfa; --violet-l:#c4b5fd;
      --cyan:#06b6d4; --emerald:#10b981; --amber:#f59e0b;
      --coral:#f43f5e; --blue:#3b82f6; --pink:#ec4899;

      --text:#F2EDE0; --mid:#A89880; --dim:#8A7A60; --muted:#6A6050;

      --serif:'Cormorant Garamond',serif;
      --sans:'DM Sans',sans-serif;
      --mono:'JetBrains Mono','Menlo',monospace;
      --fs-xs:11px; --fs-sm:13px; --fs-base:15px;
      --fs-lg:18px; --fs-xl:24px; --fs-2xl:36px;
    }

    html.light {
      --bg:#F5F0E7; --surf:#EDE7D8; --card:#FFFFFF; --card2:#F8F4EC;
      --surf-nav:#EDE7D8; --surf-top:rgba(245,240,231,0.97);

      --b:rgba(139,105,20,0.16);  --b2:rgba(139,105,20,0.30);

      --gold:#8B6914; --gold-l:#A07820;
      --gold-bg:rgba(139,105,20,0.08); --gold-d:rgba(139,105,20,0.08);
      --gold-border:rgba(139,105,20,0.22); --gold-glow:rgba(139,105,20,0.35);

      --violet:#7c3aed; --violet-l:#8B5CF6;
      --cyan:#0891b2; --emerald:#059669; --amber:#b45309;
      --coral:#c0392b; --blue:#1d4ed8; --pink:#be185d;

      --text:#1C1610; --mid:#5A4A30; --dim:#7C6A48; --muted:#9B8A6A;
    }

    /* Crossfade suave al cambiar tema */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      transition: background-color 220ms ease, border-color 220ms ease,
                  color 220ms ease, box-shadow 220ms ease;
    }

    html, body { height: 100%; overflow-x: hidden; }
    body { background: var(--bg); color: var(--text); }
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    @keyframes euFadeIn  { from { opacity: 0 } to { opacity: 1 } }
    @keyframes euScaleIn { from { opacity: 0; transform: scale(0.85) } to { opacity: 1; transform: scale(1) } }
    @keyframes euBurst {
      0%   { opacity: 1; transform: translate(0, 0) scale(1) }
      100% { opacity: 0; transform: translate(var(--dx, 28px), var(--dy, -28px)) scale(0) }
    }
    @keyframes undoCountdown {
      from { width: 100% }
      to   { width: 0% }
    }
    @keyframes euShimmer {
      0%   { background-position: 200% 0 }
      100% { background-position: -200% 0 }
    }
    @keyframes euLevelUpRise {
      0%   { transform: translateY(40px) scale(0.7);  opacity: 0; }
      60%  { transform: translateY(-8px) scale(1.05); opacity: 1; }
      100% { transform: translateY(0)    scale(1);    opacity: 1; }
    }
    @keyframes euGoldPulse {
      0%, 100% { opacity: 0.12; transform: scale(1);    }
      50%      { opacity: 0.22; transform: scale(1.05); }
    }
    @keyframes euAchievementRise {
      from { transform: translateY(100%); }
      to   { transform: translateY(0);    }
    }

    input, button { font-family: inherit; }
    input::placeholder { color: var(--muted); }
    button { cursor: pointer; }

    #root { min-height: 100vh; }

    .sk {
      background: linear-gradient(90deg,
        var(--gold-bg) 0%,
        color-mix(in srgb, var(--gold) 12%, transparent) 50%,
        var(--gold-bg) 100%);
      background-size: 200% 100%;
      animation: euShimmer 1.4s ease-in-out infinite;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="js-fallback" style="display:none;color:#fff;background:#1a0a0a;padding:20px;font-family:monospace;white-space:pre-wrap;font-size:13px;min-height:100vh;"></div>
  <script>
    setTimeout(function(){
      if (!document.getElementById('root').hasChildNodes()) {
        var fb = document.getElementById('js-fallback');
        fb.style.display = 'block';
        fb.textContent = 'React no montó. Revisa errores arriba.\n\nSi ves este mensaje, abre DevTools (F12 › Console).';
      }
    }, 5000);
    window.addEventListener('error', function(e){
      var fb = document.getElementById('js-fallback');
      fb.style.display = 'block';
      fb.textContent += '\nERROR: ' + e.message + '\n  en ' + e.filename + ':' + e.lineno;
    });
    window.addEventListener('unhandledrejection', function(e){
      var fb = document.getElementById('js-fallback');
      fb.style.display = 'block';
      fb.textContent += '\nPROMISE ERROR: ' + (e.reason && e.reason.message || e.reason);
    });
  </script>

  <!-- Server data injected by Flask -->
  <script>
    window.__EUDAIMONIA_DATA__ = {{ eudaimonia_data | tojson | safe }};

    // Patch fetch: add X-CSRFToken to all same-origin mutation requests
    (function() {
      var _fetch = window.fetch;
      var token  = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
      window.fetch = function(url, opts) {
        opts = opts || {};
        var method = (opts.method || 'GET').toUpperCase();
        if (['POST','PUT','PATCH','DELETE'].includes(method)) {
          var sameOrigin = typeof url === 'string' && !url.startsWith('http');
          if (sameOrigin) {
            opts.headers = Object.assign({}, opts.headers, {'X-CSRFToken': token});
          }
        }
        return _fetch(url, opts);
      };
    })();

    // Theme toggle — CSS vars reactive, no reload needed
    window.euToggleTheme = function() {
      var current = localStorage.getItem('eu-theme') || 'dark';
      var next    = current === 'dark' ? 'light' : 'dark';
      localStorage.setItem('eu-theme', next);
      var h = document.documentElement;
      h.classList.toggle('light', next === 'light');
      h.classList.toggle('dark',  next === 'dark');
    };

    // Recarga solo cuando otra pestaña emite data_changed (BroadcastChannel)
    (function() {
      var needsRefresh = false;

      var ch = new BroadcastChannel('eudaimonia');
      ch.onmessage = function(e) {
        if (e.data && e.data.type === 'data_changed') {
          if (document.hidden) {
            needsRefresh = true;
          } else {
            location.reload();
          }
        }
      };

      document.addEventListener('visibilitychange', function() {
        if (!document.hidden && needsRefresh) {
          needsRefresh = false;
          location.reload();
        }
      });
    })();
  </script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- EUDAIMONIA data layer (plain JS, reads from __EUDAIMONIA_DATA__ at end of file) -->
  <script src="{{ url_for('static', filename='js/eu-data.js') }}?v=20260519i"></script>

  <!-- EUDAIMONIA UI components (pre-compiled JSX → JS at build time) -->
  <script src="{{ url_for('static', filename='js/eu-components.js') }}?v=20260519i"></script>
  <script src="{{ url_for('static', filename='js/eu-screens.js') }}?v=20260519i"></script>
  <script src="{{ url_for('static', filename='js/cmdk.js') }}?v=20260519i"></script>
  <script src="{{ url_for('static', filename='js/eu-app.js') }}?v=20260519i"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
