<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>EUDAIMONIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #09070F;
      color: #F2EDE0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }

    #root { min-height: 100vh; }

    /* Subtle marble body texture */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 10% 20%, rgba(201,168,76,0.025) 0%, transparent 45%),
        radial-gradient(ellipse at 90% 80%, rgba(201,168,76,0.02)  0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(60,40,120,0.04)   0%, transparent 60%);
    }

    #root > * { position: relative; z-index: 1; }

    /* Scrollbar hidden */
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; }

    /* Placeholder color */
    input::placeholder { color: rgba(106,96,80,0.55); }
    input, button { font-family: inherit; }

    /* ── Animations ─────────────────────────────────── */
    @keyframes euFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    @keyframes euScaleIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1);    }
    }

    @keyframes euBurst {
      0%   { opacity: 1; transform: translate(0,0) scale(1);   }
      80%  { opacity: 0.6; }
      100% { opacity: 0;   transform: translate(var(--bx,20px), var(--by,-20px)) scale(0.3); }
    }

    /* Gold shimmer on cards */
    @keyframes euShimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    /* Column glow pulse on level-up */
    @keyframes euGoldPulse {
      0%, 100% { filter: brightness(1);   }
      50%      { filter: brightness(1.4); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Data (plain JS, no Babel needed) -->
  <script src="eu-data.js"></script>

  <!-- React components -->
  <script type="text/babel" src="eu-components.jsx"></script>
  <script type="text/babel" src="eu-screens.jsx"></script>
  <script type="text/babel" src="eu-app.jsx"></script>
</body>
</html>
